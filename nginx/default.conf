# ============================================
# Frido Master Dashboard — Nginx Configuration
# Load Balancing + Security + Caching
# ============================================

# ── Rate Limiting Zones ──
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

# ── Connection Limiting ──
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ── HTTP Server (for Docker/Local) ──
server {
    listen 80;
    server_name localhost;
    
    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # ── Connection Limits ──
    limit_conn addr 100;
    
    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    
    # ── Static Files (React Build) ──
    root /usr/share/nginx/html;
    index index.html;
    
    location / {
        limit_req zone=general burst=50 nodelay;
        try_files $uri $uri/ /index.html;
    }
    
    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # ── Block common attacks ──
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }
    
    # ── Health Check Endpoint ──
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

