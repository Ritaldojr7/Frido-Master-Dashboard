# Deploy Frido Master Dashboard to GitHub Pages
# Builds the frontend in demo mode (no backend required)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Main App
        env:
          VITE_DEMO_MODE: 'true'
          GITHUB_PAGES: 'true'
          VITE_APP_TYPE: 'ADMIN'
          REPO_NAME: 'Frido-Master-Dashboard'
        run: |
          rm -f .env*
          npm run build

      - name: Create build structure
        run: |
          mkdir -p final-dist
          mv dist/* final-dist/

      - name: Build Staff App 
        env:
          VITE_DEMO_MODE: 'true'
          GITHUB_PAGES: 'true'
          VITE_APP_TYPE: 'STAFF'
          REPO_NAME: 'Frido-Master-Dashboard'
        run: |
          rm -f .env*
          npm run build

      - name: Merge builds
        run: |
          mkdir -p final-dist/staff
          mv dist/* final-dist/staff/
          rm -rf dist
          mv final-dist dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
